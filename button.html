<style>

button{
    margin:10px;
    cursor:pointer;
    font-family:Arial;
}

/* YouTube */

.youtube-btn{
    background-color:black;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:20px;
    font-weight:bold;
    transition:opacity 0.15s;
}

.youtube-btn:hover{
    opacity:0.8;
}

/* GitHub */

.github-btn{
    background-color:#2da44e;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:6px;
    font-weight:bold;
    transition: box-shadow 0.3s ease-in-out;
}

.github-btn:hover{
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

/* Amazon Add to Cart */

.amazon-cart-btn{
    background-color:#ffd814;
    border:none;
    padding:10px 40px;
    border-radius:20px;
    font-size:14px;
    transition: background-color 0.3s ease;
}

.amazon-cart-btn:hover{
    background-color:#f7ca00;
}

/* Amazon Buy Now */

.amazon-buy-btn{
    background-color:#ffa41c;
    border:none;
    padding:10px 40px;
    border-radius:20px;
    font-size:14px;
    transition: background-color 0.3s ease;
}

.amazon-buy-btn:hover{
    background-color:#fa8900;
}

/* LinkedIn */

.linkedin-btn{
    background-color:#0a66c2;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:24px;
    font-weight:bold;
}

.linkedin-btn:hover{
    background-color:#004182;
}

/* Twitter/X */

.twitter-btn{
    background-color:black;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:24px;
    font-weight:bold;
}

.twitter-btn:hover{
    opacity:0.85;
}

/* Instagram */

.instagram-btn{
    background:linear-gradient(
        45deg,
        #f58529,
        #dd2a7b,
        #8134af,
        #515bd4
    );
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    font-weight:bold;
}

/* Netflix */

.netflix-btn{
    background-color:#e50914;
    color:white;
    border:none;
    padding:12px 26px;
    border-radius:4px;
    font-weight:bold;
}

.netflix-btn:hover{
    background-color:#c40812;
}

/* Spotify */

.spotify-btn{
    background-color:#1db954;
    color:black;
    border:none;
    padding:12px 30px;
    border-radius:25px;
    font-weight:bold;
}

.spotify-btn:hover{
    transform:scale(1.05);
}

/* Discord */

.discord-btn{
    background-color:#5865f2;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    font-weight:bold;
}

.discord-btn:hover{
    background-color:#4752c4;
}

</style>

<!DOCTYPE html>
<html>
<head>
    <title>Button Practice</title>
</head>
<body>

    <button class="youtube-btn">Subscribe</button>

    <button class="github-btn">Sign up</button>

    <button class="amazon-cart-btn">Add to Cart</button>

    <button class="amazon-buy-btn">Buy Now</button>

    <button class="linkedin-btn">Apply on company website</button>

    <button class="twitter-btn">Follow</button>

    <button class="instagram-btn">Follow</button>

    <button class="netflix-btn">Sign In</button>

    <button class="spotify-btn">Play</button>

    <button class="discord-btn">Join Server</button>

</body>
</html>
